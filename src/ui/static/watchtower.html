<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepGravity Watchtower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: hsl(224, 25%, 6%);
    color: hsl(220, 15%, 85%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid hsla(224, 20%, 20%, 0.45);
    background: hsla(224, 20%, 10%, 0.65);
    flex-shrink: 0;
}

header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: hsl(180, 100%, 50%);
}

#status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: hsl(142, 70%, 45%);
    transition: background 0.3s;
    box-shadow: 0 0 8px hsla(142, 70%, 45%, 0.5);
}

#status-dot.stalled { background: hsl(45, 90%, 50%); box-shadow: 0 0 8px hsla(45, 90%, 50%, 0.5); }
#status-dot.dead { background: hsl(355, 75%, 55%); box-shadow: 0 0 8px hsla(355, 75%, 55%, 0.5); }
#status-dot.error { background: hsl(355, 75%, 55%); box-shadow: 0 0 8px hsla(355, 75%, 55%, 0.5); }

#status-text {
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#status-text.alive { color: hsl(142, 70%, 45%); }
#status-text.stalled { color: hsl(45, 90%, 50%); }
#status-text.dead { color: hsl(355, 75%, 55%); }
#status-text.error { color: hsl(355, 75%, 55%); }

#age-display {
    margin-left: auto;
    font-size: 0.8rem;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: hsl(220, 15%, 50%);
}

.ekg-container {
    flex: 1;
    position: relative;
    min-height: 0;
}

#ekg-canvas {
    width: 100%;
    height: 100%;
    display: block;
}

.info-overlay {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    pointer-events: none;
}

.info-card {
    background: hsla(224, 20%, 10%, 0.8);
    border: 1px solid hsla(224, 20%, 20%, 0.45);
    border-radius: 8px;
    padding: 12px 16px;
    backdrop-filter: blur(8px);
}

.info-card .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: hsl(220, 15%, 50%);
    margin-bottom: 4px;
}

.info-card .value {
    font-size: 0.9rem;
    font-weight: 500;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: hsl(180, 100%, 50%);
}

.info-card .value.pending {
    color: hsl(45, 90%, 50%);
    animation: pulse-text 1.5s ease-in-out infinite;
}

@keyframes pulse-text {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.info-card .value.error-val {
    color: hsl(355, 75%, 55%);
}

.pulse-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid hsla(142, 70%, 45%, 0.15);
    pointer-events: none;
}

.pulse-ring.active {
    animation: ring-pulse 2s ease-out infinite;
}

.pulse-ring.stalled { border-color: hsla(45, 90%, 50%, 0.15); }
.pulse-ring.dead { border-color: hsla(355, 75%, 55%, 0.15); opacity: 0.3; }

@keyframes ring-pulse {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

.pulse-ring.beat {
    animation: beat-pulse 0.4s ease-out;
}

@keyframes beat-pulse {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
    50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.1; }
    100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
}

@media (max-width: 600px) {
    header { padding: 8px 12px; flex-wrap: wrap; }
    header h1 { font-size: 0.95rem; }
    #age-display { margin-left: 0; width: 100%; text-align: right; }
    .info-overlay { grid-template-columns: 1fr 1fr; bottom: 12px; left: 12px; right: 12px; gap: 8px; }
    .info-card { padding: 8px 12px; }
}
</style>
</head>
<body>

<header>
    <div id="status-dot"></div>
    <h1>DEEP&nbsp;GRAVITY</h1>
    <span id="status-text">WAITING</span>
    <span id="age-display">—</span>
</header>

<div class="ekg-container">
    <canvas id="ekg-canvas"></canvas>
    <div class="pulse-ring" id="pulse-ring"></div>
    <div class="info-overlay" id="info-overlay">
        <div class="info-card">
            <div class="label">Loop</div>
            <div class="value" id="val-loop">—</div>
        </div>
        <div class="info-card">
            <div class="label">Session</div>
            <div class="value" id="val-session">—</div>
        </div>
        <div class="info-card">
            <div class="label">History</div>
            <div class="value" id="val-history">—</div>
        </div>
        <div class="info-card">
            <div class="label">Pending Approval</div>
            <div class="value" id="val-pending">—</div>
        </div>
        <div class="info-card">
            <div class="label">Last Tool</div>
            <div class="value" id="val-tool">—</div>
        </div>
        <div class="info-card">
            <div class="label">Providers</div>
            <div class="value" id="val-providers">—</div>
        </div>
        <div class="info-card">
            <div class="label">Watchtower</div>
            <div class="value" id="val-watchtower">—</div>
        </div>
        <div class="info-card">
            <div class="label">Idle</div>
            <div class="value" id="val-idle">—</div>
        </div>
    </div>
</div>

<script>
// ── EKG Canvas ──
const canvas = document.getElementById('ekg-canvas');
const ctx = canvas.getContext('2d');
const pulseRing = document.getElementById('pulse-ring');

let width, height;
let dataPoints = [];
const MAX_POINTS = 300;
let lastBeatTime = 0;
let currentStatus = 'alive';
let previousStatus = 'alive';
let triggerPulse = false;

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    width = rect.width;
    height = rect.height;
    ctx.scale(devicePixelRatio, devicePixelRatio);
}

function drawEKG(timestamp) {
    ctx.clearRect(0, 0, width, height);

    const midY = height / 2;
    const amplitude = height * 0.35;
    const isDead = currentStatus === 'dead';
    const isStalled = currentStatus === 'stalled';

    // Grid lines
    ctx.strokeStyle = 'hsla(224, 20%, 20%, 0.2)';
    ctx.lineWidth = 0.5;
    for (let y = 0; y < height; y += 30) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    }

    if (dataPoints.length < 2) {
        // Flatline
        ctx.strokeStyle = isDead ? 'hsl(355, 75%, 55%)' : 'hsla(142, 70%, 45%, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, midY);
        ctx.lineTo(width, midY);
        ctx.stroke();
        return;
    }

    // Determine trace color
    let traceColor;
    if (isDead) traceColor = 'hsl(355, 75%, 55%)';
    else if (isStalled) traceColor = 'hsl(45, 90%, 50%)';
    else traceColor = 'hsl(142, 70%, 45%)';

    // Glow effect
    ctx.shadowColor = traceColor;
    ctx.shadowBlur = isDead ? 0 : 12;
    ctx.strokeStyle = traceColor;
    ctx.lineWidth = isDead ? 1.5 : 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    const stepX = width / MAX_POINTS;
    const isPulsing = triggerPulse;

    ctx.beginPath();
    let started = false;

    for (let i = 0; i < dataPoints.length; i++) {
        const x = (i / MAX_POINTS) * width;
        let y;

        if (isDead) {
            // Flatline
            y = midY;
        } else if (isStalled) {
            // Slow, weak oscillation
            const t = timestamp / 1000 + i * 0.02;
            y = midY + Math.sin(t * 0.5) * amplitude * 0.1;
        } else {
            // EKG pulse shape with decay
            const val = dataPoints[i];
            const age = dataPoints.length - i;
            const decay = Math.max(0.1, 1 - (age / MAX_POINTS) * 2);
            y = midY - val * amplitude * decay;
        }

        if (!started) {
            ctx.moveTo(x, y);
            started = true;
        } else {
            ctx.lineTo(x, y);
        }
    }

    ctx.stroke();
    ctx.shadowBlur = 0;

    // Leading edge glow dot
    if (!isDead && dataPoints.length > 0) {
        const lastX = width;
        const lastVal = dataPoints[dataPoints.length - 1];
        const lastY = midY - lastVal * amplitude * 0.2;
        
        ctx.beginPath();
        ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
        ctx.fillStyle = traceColor;
        ctx.shadowColor = traceColor;
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    triggerPulse = false;
}

function addDataPoint(value) {
    dataPoints.push(value);
    if (dataPoints.length > MAX_POINTS) {
        dataPoints.shift();
    }
}

// ── Heartbeat Polling ──
async function pollHeartbeat() {
    try {
        const res = await fetch('/api/heartbeat');
        const hb = await res.json();
        updateDisplay(hb);
    } catch (err) {
        updateDisplay({ status: 'error', error: err.message });
    }
}

function updateDisplay(hb) {
    const status = hb.status || 'error';
    previousStatus = currentStatus;
    currentStatus = status;

    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const ageDisplay = document.getElementById('age-display');

    dot.className = status;
    statusText.className = status;
    statusText.textContent = status.toUpperCase();

    if (status === 'alive') {
        ageDisplay.textContent = `${hb.age_seconds || 0}s since last beat`;
    } else if (status === 'stalled') {
        ageDisplay.textContent = `⏸️ ${hb.age_seconds || 0}s stale`;
    } else if (status === 'dead') {
        ageDisplay.textContent = `💀 ${hb.age_seconds || 0}s stale`;
    } else {
        ageDisplay.textContent = `⚠️ ${hb.error || 'unknown'}`;
    }

    // Info cards
    setVal('val-loop', hb.loop_count ?? '—');
    setVal('val-session', (hb.session || '—').slice(0, 30));
    setVal('val-history', hb.history_len != null ? `${hb.history_len} msgs` : '—');
    setVal('val-tool', hb.last_tool || '—');

    const pending = hb.pending_approval;
    const pendingEl = document.getElementById('val-pending');
    if (pending) {
        pendingEl.textContent = pending;
        pendingEl.className = 'value pending';
    } else {
        pendingEl.textContent = 'None';
        pendingEl.className = 'value';
    }

    // Watchdog status
    const wt = hb.watchdog;
    const wtEl = document.getElementById('val-watchtower');
    if (wt) {
        if (wt.went_idle) {
            wtEl.textContent = '⏸️ Idle — paused';
            wtEl.className = 'value pending';
        } else if (wt.running) {
            wtEl.textContent = `✓ ${wt.idle_pings}/${wt.max_idle_pings} pings`;
            wtEl.className = 'value';
        } else if (!wt.enabled) {
            wtEl.textContent = '⊘ Disabled';
            wtEl.className = 'value';
        } else {
            wtEl.textContent = '—';
            wtEl.className = 'value';
        }
    } else {
        wtEl.textContent = 'Not initialized';
        wtEl.className = 'value';
    }

    // Idle time
    const idleEl = document.getElementById('val-idle');
    if (wt) {
        const secs = wt.idle_seconds || 0;
        if (secs > 60) {
            idleEl.textContent = `${Math.round(secs / 60)} min`;
        } else {
            idleEl.textContent = `${Math.round(secs)}s`;
        }
        if (wt.went_idle) {
            idleEl.className = 'value pending';
        } else if (secs > 120) {
            idleEl.className = 'value';
        } else {
            idleEl.className = 'value';
        }
    } else {
        idleEl.textContent = '—';
    }

    // Providers
    const provEl = document.getElementById('val-providers');
    if (hb.providers) {
        const lines = Object.entries(hb.providers).map(([role, info]) => {
            const errs = info.errors || 0;
            return errs > 0 ? `${role}: ${info.provider} ⚠${errs}` : `${role}: ${info.provider}`;
        });
        provEl.textContent = lines.join(' | ') || '—';
        provEl.className = 'value';
    } else {
        provEl.textContent = '—';
        provEl.className = 'value';
    }

    // EKG data — push a pulse on each alive heartbeat
    const now = Date.now();
    if (status === 'alive') {
        const timeSinceLastBeat = now - lastBeatTime;
        // Generate a QRS complex (the big spike) on each new beat
        if (timeSinceLastBeat > 2000) {
            triggerPulse = true;
            lastBeatTime = now;
            // Generate EKG complex: small dip, big spike, small dip
            const complex = [
                0, 0, -0.05, -0.1, -0.05, 0, 0.1, 0.3, 0.7, 1.0, 0.8, 0.4, 0.1, -0.1, -0.2, -0.15, -0.05, 0, 0, 0
            ];
            complex.forEach(v => addDataPoint(v));
            // Animate the pulse ring
            const ring = document.getElementById('pulse-ring');
            ring.className = 'pulse-ring';
            ring.classList.add(status);
            void ring.offsetWidth; // force reflow
            ring.classList.add('beat');
        } else {
            // Between beats — small baseline noise
            addDataPoint((Math.random() - 0.5) * 0.05);
        }
    } else if (status === 'stalled') {
        // Slow wander
        addDataPoint(Math.sin(Date.now() / 2000) * 0.1);
    } else {
        // Dead — push toward flatline
        addDataPoint(0);
    }
}

function setVal(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
}

// ── Animation Loop ──
function animate(timestamp) {
    drawEKG(timestamp);
    requestAnimationFrame(animate);
}

// ── Init ──
resize();
window.addEventListener('resize', resize);

// Fill baseline
for (let i = 0; i < 100; i++) {
    dataPoints.push(0);
}

// Poll every 2 seconds
pollHeartbeat();
setInterval(pollHeartbeat, 2000);

animate(performance.now());
</script>
</body>
</html>
